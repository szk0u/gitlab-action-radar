name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install_args: aube bun

      - name: Install dependencies
        run: aube ci --ignore-scripts

      - name: Check formatting
        run: aube run fmt:check

      - name: Lint
        run: aube run lint

      - name: Test
        run: aube run test

      - name: Build
        run: aube run build

      - name: Build Storybook
        run: aube run build-storybook

      - name: Install Playwright Chromium
        run: aube exec playwright -- install --with-deps chromium

      - name: Storybook visual regression
        run: aube exec playwright -- test
